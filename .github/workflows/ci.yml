name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }} / rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # MSRV bumped 1.75.0 -> 1.85.0 in v0.1.1: transitive deps from
        # ed25519-dalek (pem feature) and clap pulled in crates that
        # require `edition = "2024"`, which only stabilised in Rust 1.85.
        rust: [1.85.0, stable]
    steps:
      - uses: actions/checkout@v6
      - name: install rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt check
        run: cargo fmt --all --check

      # v0.2 lifted the v0.1 `sigstore-bridge` compile_error! stub: the
      # feature is now a real Rekor REST bridge + cosign bundle parser.
      # v0.3 removed the empty `audit-db` flag (Lumina S982 anti-pattern,
      # the feature only set up a dep that no code path used). It will
      # come back in a future release with actual SQLite-backed history.
      # `--all-features` is therefore safe to use directly now.
      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test (default features)
        run: cargo test --no-default-features --no-fail-fast
      - name: test (otlp)
        run: cargo test --features otlp --no-fail-fast
      - name: test (sigstore-bridge)
        run: cargo test --features sigstore-bridge --no-fail-fast
      - name: test (rmcp-control)
        run: cargo test --features rmcp-control --no-fail-fast
      - name: test (all features)
        run: cargo test --all-features --no-fail-fast

      - name: cve simulation
        run: cargo test --test cve_simulation -- --nocapture

  bench:
    name: bench regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: bench
        run: cargo bench --bench scanner -- --quick

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: audit
        run: cargo audit
