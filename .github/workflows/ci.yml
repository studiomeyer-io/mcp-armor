name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }} / rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # MSRV bumped 1.75.0 -> 1.85.0 in v0.1.1: transitive deps from
        # ed25519-dalek (pem feature) and clap pulled in crates that
        # require `edition = "2024"`, which only stabilised in Rust 1.85.
        rust: [1.85.0, stable]
    steps:
      - uses: actions/checkout@v6
      - name: install rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt check
        run: cargo fmt --all --check
      - name: clippy
        # Avoid --all-features: that activates the reserved `sigstore-bridge`
        # flag which is a v0.2 placeholder and intentionally fires
        # `compile_error!` (see src/sigstore_bridge_stub.rs).
        run: cargo clippy --all-targets --features audit-db -- -D warnings
      - name: test (with audit-db)
        run: cargo test --features audit-db --no-fail-fast
      - name: test (default features)
        run: cargo test --no-default-features --no-fail-fast
      - name: verify sigstore-bridge stub still rejects build
        run: |
          if cargo check --features sigstore-bridge 2>/dev/null; then
            echo "ERROR: sigstore-bridge feature compiled — compile_error! stub bypassed."
            exit 1
          else
            echo "OK: sigstore-bridge stub correctly rejects build (v0.2 placeholder)."
          fi
      - name: cve simulation
        run: cargo test --features audit-db --test cve_simulation -- --nocapture

  bench:
    name: bench regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: bench
        run: cargo bench --bench scanner -- --quick

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: audit
        run: cargo audit
