name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }} / rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # MSRV history: 1.75 -> 1.85 (v0.1.1, edition-2024 deps from
        # ed25519-dalek/clap) -> 1.89 (v0.7 dep refresh). The icu 2.2.0 family
        # (via regex/idna) needs rustc 1.86 and rmcp 1.7.0 uses let-chains
        # (stabilised in 1.88); 1.89 gives a small buffer over both. Verified
        # green locally on 1.89.0 with --all-features (clippy + full test set).
        rust: [1.89.0, stable]
    steps:
      - uses: actions/checkout@v7
      - name: install rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt check
        run: cargo fmt --all --check

      # v0.2 lifted the v0.1 `sigstore-bridge` compile_error! stub: the
      # feature is now a real Rekor REST bridge + cosign bundle parser.
      # v0.3 removed the empty `audit-db` flag (Lumina S982 anti-pattern,
      # the feature only set up a dep that no code path used). It will
      # come back in a future release with actual SQLite-backed history.
      # `--all-features` is therefore safe to use directly now.
      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test (default features)
        run: cargo test --no-default-features --no-fail-fast
      - name: test (otlp)
        run: cargo test --features otlp --no-fail-fast
      - name: test (sigstore-bridge)
        run: cargo test --features sigstore-bridge --no-fail-fast
      - name: test (rmcp-control)
        run: cargo test --features rmcp-control --no-fail-fast
      - name: test (all features)
        run: cargo test --all-features --no-fail-fast

      - name: cve simulation
        run: cargo test --test cve_simulation -- --nocapture

  perf-gate:
    name: scanner p99 latency gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Real percentile gate. `tests/perf_gate.rs` times N scans over
      # representative payload sizes (clean/match 1k/10k/100k + a
      # Stage-4 confusable payload), computes the p99, prints every
      # percentile, and ASSERTS the worst p99 stays under the documented
      # 5 ms budget. Release mode is mandatory - a debug build runs
      # ~10-30x slower and the test skips its assertion there on purpose.
      # This replaces the old `cargo bench -- --quick` step which exited
      # 0 unconditionally (criterion emits mean/median, never a
      # percentile, so it never enforced the README's "p99 < 5 ms" claim).
      - name: scanner p99 gate
        run: cargo test --release --test perf_gate -- --nocapture
      # Keep the criterion bench as a compile + smoke check so the
      # mean/median trend data stays available (it does NOT gate - the
      # assertion above does).
      - name: criterion bench (smoke, non-gating)
        run: cargo bench --bench scanner -- --quick

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: audit
        run: cargo audit
